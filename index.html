<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HASH</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">

    <!-- Barra lateral: listado de frentes (contextos) -->
    <aside id="sidebar">
      <h1 id="app-title">HASH</h1>
      <nav id="front-list">
        <!-- Los frentes se inyectan dinámicamente desde js/ui.js -->
      </nav>
    </aside>

    <!-- Panel principal: memoria histórica del frente activo -->
    <main id="main">

      <header id="main-header">
        <div id="main-header-top">
          <div>
            <h2 id="active-front-name">—</h2>
            <p id="active-front-description"></p>
          </div>
          <div id="sync-controls">
            <button type="button" id="sync-button">Actualizar desde fuente externa</button>
            <p id="sync-status" aria-live="polite"></p>
          </div>
        </div>
      </header>

      <section id="message-list" aria-live="polite">
        <!-- Los mensajes se inyectan dinámicamente desde js/ui.js -->
      </section>

      <footer id="composer">
        <form id="message-form">
          <textarea
            id="message-input"
            placeholder="Escribí algo para registrar en este frente..."
            rows="3"
            required
          ></textarea>
          <button type="submit" id="message-submit">Guardar</button>
        </form>
      </footer>

    </main>

  </div>

  <script src="js/config.js"></script>
  <script src="js/datasources/dataSourceInterface.js"></script>
  <script src="js/datasources/googleSheetsSource.js"></script>
  <script src="js/datasources/localSource.js"></script>
  <script src="js/datasources/dataSourceFactory.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
