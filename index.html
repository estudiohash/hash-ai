<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HASH</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <aside id="sidebar">
      <h1 id="app-title">HASH</h1>
      <nav id="front-list"></nav>
    </aside>

    <main id="main">
      <header id="main-header">
        <div id="main-header-top">
          <div>
            <h2 id="active-front-name">—</h2>
            <p id="active-front-description"></p>
          </div>
          <div id="sync-controls">
            <button type="button" id="sync-button">Actualizar desde fuente externa</button>
            <p id="sync-status" aria-live="polite"></p>
          </div>
        </div>
      </header>

      <section id="message-list" aria-live="polite"></section>

      <footer id="composer">
        <textarea id="message-input" placeholder="Escribí algo para registrar en este frente..." rows="3"></textarea>
        <button type="button" id="message-submit">Guardar</button>
      </footer>
    </main>

  </div>
  <div id="new-front-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="new-front-modal-box">
      <h3 id="modal-title">Nuevo chat</h3>
      <label for="new-front-name">Nombre <span aria-hidden="true">*</span></label>
      <input type="text" id="new-front-name" placeholder="Ej: Lecturas, Trabajo, Ideas..." maxlength="60" autocomplete="off">
      <label for="new-front-description">Descripción <span class="optional">(opcional)</span></label>
      <input type="text" id="new-front-description" placeholder="Una línea sobre este chat." maxlength="120" autocomplete="off">
      <p id="new-front-status" aria-live="polite"></p>
      <div id="modal-actions">
        <button type="button" id="new-front-cancel">Cancelar</button>
        <button type="button" id="new-front-submit">Crear chat</button>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
